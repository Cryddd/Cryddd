<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 100" width="80" height="100" role="img" aria-label="cute ghibli-inspired floating spirit with amber sparkles">
  <defs>
    <filter id="aura" filterUnits="userSpaceOnUse" x="-10" y="-10" width="100" height="120">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feFlood flood-color="#F7A325" flood-opacity="0.35" result="col"/>
      <feComposite in="col" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Soft pulsing aura -->
  <ellipse cx="40" cy="58" rx="30" ry="33" fill="#F7A325" opacity="0.07">
    <animate attributeName="opacity" values="0.07;0.16;0.07" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="rx" values="30;35;30" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="ry" values="33;38;33" dur="3s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Spirit body group – gentle float bob -->
  <g>
    <animateTransform attributeName="transform" type="translate"
      values="0,0; 0,-7; 0,0" keyTimes="0;0.5;1" dur="3s"
      repeatCount="indefinite" calcMode="spline"
      keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>

    <!-- Left ear -->
    <ellipse cx="24" cy="25" rx="7"   ry="9"  fill="#ccd0e8"/>
    <ellipse cx="24" cy="25" rx="4"   ry="5.5" fill="#e4dff4"/>
    <!-- Right ear -->
    <ellipse cx="56" cy="25" rx="7"   ry="9"  fill="#ccd0e8"/>
    <ellipse cx="56" cy="25" rx="4"   ry="5.5" fill="#e4dff4"/>

    <!-- Main round body -->
    <ellipse cx="40" cy="60" rx="26" ry="32" fill="#dcdcf0"/>
    <!-- Highlight -->
    <ellipse cx="31" cy="46" rx="7"  ry="5"  fill="white" opacity="0.55"/>

    <!-- Left eye white -->
    <ellipse cx="31" cy="52" rx="7"  ry="8"  fill="white">
      <animate attributeName="ry" values="8;8;0.3;8;8" keyTimes="0;0.44;0.5;0.56;1" dur="5s" repeatCount="indefinite"/>
    </ellipse>
    <!-- Right eye white -->
    <ellipse cx="49" cy="52" rx="7"  ry="8"  fill="white">
      <animate attributeName="ry" values="8;8;0.3;8;8" keyTimes="0;0.44;0.5;0.56;1" dur="5s" begin="0.12s" repeatCount="indefinite"/>
    </ellipse>
    <!-- Left pupil -->
    <ellipse cx="33" cy="54" rx="4"  ry="5"  fill="#1a1a2e">
      <animate attributeName="ry" values="5;5;0.1;5;5" keyTimes="0;0.44;0.5;0.56;1" dur="5s" repeatCount="indefinite"/>
    </ellipse>
    <!-- Right pupil -->
    <ellipse cx="51" cy="54" rx="4"  ry="5"  fill="#1a1a2e">
      <animate attributeName="ry" values="5;5;0.1;5;5" keyTimes="0;0.44;0.5;0.56;1" dur="5s" begin="0.12s" repeatCount="indefinite"/>
    </ellipse>
    <!-- Eye shine -->
    <circle cx="30" cy="50" r="1.8" fill="white" opacity="0.85"/>
    <circle cx="48" cy="50" r="1.8" fill="white" opacity="0.85"/>

    <!-- Nose -->
    <circle cx="40" cy="62" r="1.5" fill="#b0a8c4"/>

    <!-- Smile -->
    <path d="M 34 68 Q 40 76 46 68" stroke="#8888aa" stroke-width="2" fill="none" stroke-linecap="round"/>

    <!-- Stubby feet -->
    <ellipse cx="32" cy="89" rx="8"  ry="5"  fill="#c8c8dc"/>
    <ellipse cx="48" cy="89" rx="8"  ry="5"  fill="#c8c8dc"/>
  </g>

  <!-- Sparkles – independent of body float -->
  <circle cx="10" cy="70" r="2"   fill="#F7A325" filter="url(#aura)">
    <animate attributeName="cy"      values="70;38;70" dur="2.4s" begin="0s"   repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.9;0"  dur="2.4s" begin="0s"   repeatCount="indefinite"/>
  </circle>
  <circle cx="72" cy="65" r="1.5" fill="#ffd166">
    <animate attributeName="cy"      values="65;33;65" dur="2.8s" begin="0.8s"  repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.8;0"  dur="2.8s" begin="0.8s"  repeatCount="indefinite"/>
  </circle>
  <circle cx="6"  cy="52" r="1.5" fill="#F7A325">
    <animate attributeName="cy"      values="52;20;52" dur="3.2s" begin="1.6s"  repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.7;0"  dur="3.2s" begin="1.6s"  repeatCount="indefinite"/>
  </circle>
  <circle cx="76" cy="78" r="2"   fill="#ffd166" filter="url(#aura)">
    <animate attributeName="cy"      values="78;46;78" dur="2.0s" begin="2.4s"  repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.9;0"  dur="2.0s" begin="2.4s"  repeatCount="indefinite"/>
  </circle>
</svg>
