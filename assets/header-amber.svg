<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 220" width="100%" role="img" aria-label="cozy animated night sky with amber glow frame">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1a1600"/>
      <stop offset="45%"  stop-color="#130900"/>
      <stop offset="100%" stop-color="#0a0700"/>
    </linearGradient>
    <linearGradient id="innerTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#F7A325" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#F7A325" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="innerBot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#F7A325" stop-opacity="0"/>
      <stop offset="100%" stop-color="#F7A325" stop-opacity="0.30"/>
    </linearGradient>
    <linearGradient id="innerLeft" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#F7A325" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#F7A325" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="innerRight" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#F7A325" stop-opacity="0"/>
      <stop offset="100%" stop-color="#F7A325" stop-opacity="0.22"/>
    </linearGradient>
    <filter id="ambGlow" filterUnits="userSpaceOnUse" x="-30" y="-30" width="960" height="280">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feFlood flood-color="#F7A325" flood-opacity="0.92" result="col"/>
      <feComposite in="col" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="sg" filterUnits="userSpaceOnUse" x="-10" y="-10" width="920" height="240">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feFlood flood-color="#F7A325" flood-opacity="0.65" result="col"/>
      <feComposite in="col" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="900" height="220" fill="url(#bg)"/>

  <rect x="0"   y="0"   width="900" height="50"  fill="url(#innerTop)"   opacity="0.9"/>
  <rect x="0"   y="170" width="900" height="50"  fill="url(#innerBot)"   opacity="0.9"/>
  <rect x="0"   y="0"   width="60"  height="220" fill="url(#innerLeft)"  opacity="0.9"/>
  <rect x="840" y="0"   width="60"  height="220" fill="url(#innerRight)" opacity="0.9"/>

