<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 220" width="100%" role="img" aria-label="professional night sky header with soft amber border">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0d1117"/>
      <stop offset="55%"  stop-color="#0a0c14"/>
      <stop offset="100%" stop-color="#07080f"/>
    </linearGradient>
    <linearGradient id="horizonGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#C8822A" stop-opacity="0"/>
      <stop offset="60%"  stop-color="#C8822A" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#C8822A" stop-opacity="0.20"/>
    </linearGradient>
    <linearGradient id="topFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#D4A860" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#D4A860" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="botFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#D4A860" stop-opacity="0"/>
      <stop offset="100%" stop-color="#D4A860" stop-opacity="0.14"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="220" fill="url(#bg)"/>

  <!-- Horizon warm glow -->
  <rect x="0" y="120" width="900" height="100" fill="url(#horizonGlow)"/>

  <!-- Moon -->
  <circle cx="820" cy="42" r="22" fill="#fdeec8"/>
  <circle cx="831" cy="37" r="19" fill="#0a0c14"/>
  <!-- Moon ring halo -->
  <circle cx="820" cy="42" r="30" fill="none" stroke="#D4A860" stroke-width="1.5" opacity="0.15"/>

  <!-- Stars — slow, gentle twinkle -->
  <circle cx="52"  cy="20" r="1.4" fill="#fdecc0"><animate attributeName="opacity" values="0.65;0.18;0.65" dur="4.2s" repeatCount="indefinite"/></circle>
  <circle cx="128" cy="13" r="0.9" fill="#fdecc0"><animate attributeName="opacity" values="0.55;0.12;0.55" dur="5.4s" begin="0.9s" repeatCount="indefinite"/></circle>
  <circle cx="210" cy="29" r="1.4" fill="#fdecc0"><animate attributeName="opacity" values="0.65;0.20;0.65" dur="4.8s" begin="1.6s" repeatCount="indefinite"/></circle>
  <circle cx="298" cy="17" r="0.9" fill="#fdecc0"><animate attributeName="opacity" values="0.50;0.10;0.50" dur="6.1s" begin="0.4s" repeatCount="indefinite"/></circle>
  <circle cx="416" cy="11" r="1.4" fill="#fdecc0"><animate attributeName="opacity" values="0.65;0.18;0.65" dur="4.0s" begin="1.1s" repeatCount="indefinite"/></circle>
  <circle cx="524" cy="24" r="0.9" fill="#fdecc0"><animate attributeName="opacity" values="0.50;0.12;0.50" dur="5.2s" begin="2.4s" repeatCount="indefinite"/></circle>
  <circle cx="616" cy="15" r="1.4" fill="#fdecc0"><animate attributeName="opacity" values="0.60;0.18;0.60" dur="5.6s" begin="1.4s" repeatCount="indefinite"/></circle>
  <circle cx="692" cy="33" r="0.9" fill="#fdecc0"><animate attributeName="opacity" values="0.50;0.10;0.50" dur="4.6s" begin="0.7s" repeatCount="indefinite"/></circle>
  <circle cx="760" cy="19" r="0.9" fill="#fdecc0"><animate attributeName="opacity" values="0.55;0.18;0.55" dur="6.0s" begin="3.0s" repeatCount="indefinite"/></circle>
  <circle cx="82"  cy="44" r="0.9" fill="#fdecc0"><animate attributeName="opacity" values="0.50;0.12;0.50" dur="5.8s" begin="3.4s" repeatCount="indefinite"/></circle>
  <circle cx="258" cy="41" r="1.4" fill="#fdecc0"><animate attributeName="opacity" values="0.65;0.22;0.65" dur="3.8s" begin="1.2s" repeatCount="indefinite"/></circle>
  <circle cx="444" cy="45" r="0.9" fill="#fdecc0"><animate attributeName="opacity" values="0.50;0.12;0.50" dur="6.4s" begin="2.1s" repeatCount="indefinite"/></circle>
  <circle cx="572" cy="36" r="1.4" fill="#fdecc0"><animate attributeName="opacity" values="0.60;0.18;0.60" dur="4.4s" begin="4.0s" repeatCount="indefinite"/></circle>
  <circle cx="740" cy="47" r="0.9" fill="#fdecc0"><animate attributeName="opacity" values="0.50;0.10;0.50" dur="5.0s" begin="1.0s" repeatCount="indefinite"/></circle>
  <circle cx="158" cy="52" r="0.9" fill="#fdecc0"><animate attributeName="opacity" values="0.40;0.08;0.40" dur="7.0s" begin="4.5s" repeatCount="indefinite"/></circle>
  <circle cx="352" cy="55" r="0.9" fill="#fdecc0"><animate attributeName="opacity" values="0.40;0.08;0.40" dur="7.2s" begin="2.7s" repeatCount="indefinite"/></circle>
  <circle cx="488" cy="50" r="0.9" fill="#fdecc0"><animate attributeName="opacity" values="0.40;0.08;0.40" dur="5.8s" begin="1.9s" repeatCount="indefinite"/></circle>

  <!-- Subtle distant mountain range (left) -->
  <polygon points="0,185 80,148 160,168 240,142 310,160 380,178 0,178" fill="#111622" opacity="0.85"/>

  <!-- Mt Fuji silhouette (centre-left) -->
  <polygon points="280,178 370,95 460,178" fill="#0e1420"/>
  <!-- Snow cap -->
  <polygon points="356,108 370,95 384,108 378,116 362,116" fill="#ddd8ce" opacity="0.55"/>

  <!-- Subtle distant mountain range (right) -->
  <polygon points="460,178 540,150 610,165 690,140 770,155 850,148 900,162 900,178" fill="#111622" opacity="0.85"/>

  <!-- Ground -->
  <rect x="0" y="178" width="900" height="42" fill="#070810"/>

  <!-- Horizon atmospheric line -->
  <rect x="0" y="176" width="900" height="1.5" fill="#D4873A" opacity="0.20"/>

  <!-- Drifting clouds — very slow, barely visible -->
  <g opacity="0.065">
    <animateTransform attributeName="transform" type="translate" from="0 0" to="-1300 0" dur="90s" begin="-35s" repeatCount="indefinite"/>
    <ellipse cx="200" cy="65" rx="85" ry="16" fill="#d8d0c4"/>
    <ellipse cx="246" cy="52" rx="52" ry="12" fill="#d8d0c4"/>
  </g>
  <g opacity="0.05">
    <animateTransform attributeName="transform" type="translate" from="0 0" to="-1300 0" dur="65s" begin="-18s" repeatCount="indefinite"/>
    <ellipse cx="580" cy="72" rx="72" ry="14" fill="#d8d0c4"/>
    <ellipse cx="614" cy="60" rx="44" ry="11" fill="#d8d0c4"/>
  </g>

  <!-- Amber rising particles — very slow, professional -->
  <circle cx="195" cy="158" r="1.1" fill="#D4A860">
    <animate attributeName="cy"      values="158;96;158"  dur="14s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="opacity" values="0;0.45;0"    dur="14s" repeatCount="indefinite"/>
  </circle>
  <circle cx="446" cy="152" r="0.9" fill="#D4A860">
    <animate attributeName="cy"      values="152;90;152"  dur="18s" begin="5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="opacity" values="0;0.38;0"    dur="18s" begin="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="682" cy="160" r="1.1" fill="#D4A860">
    <animate attributeName="cy"      values="160;100;160" dur="12s" begin="8s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="opacity" values="0;0.45;0"    dur="12s" begin="8s" repeatCount="indefinite"/>
  </circle>

  <!-- Top/bottom inner amber fade -->
  <rect x="0" y="0"   width="900" height="55" fill="url(#topFade)"/>
  <rect x="0" y="165" width="900" height="55" fill="url(#botFade)"/>

  <!-- Amber border — thin, slow, refined pulse -->
  <g>
    <animate attributeName="opacity" values="0.45;0.80;0.45" dur="7s" repeatCount="indefinite"/>
    <rect x="0"   y="0"   width="900" height="1.5" fill="#E8C07A"/>
    <rect x="0"   y="218" width="900" height="2"   fill="#E8C07A"/>
    <rect x="0"   y="0"   width="2"   height="220" fill="#E8C07A"/>
    <rect x="898" y="0"   width="2"   height="220" fill="#E8C07A"/>
  </g>
</svg>
